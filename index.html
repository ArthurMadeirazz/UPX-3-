<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Economia com Energia Solar 
    UPX 3
  </title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Simulador de Economia com Energia Solar (UPX 3)</h1>
    <label for="consumo">Consumo mensal (kWh):</label>
    <input type="number" id="consumo" value="0">

    <label for="valorConta">Valor médio da conta de luz (R$):</label>
    <input type="number" id="valorConta" value="0">

    <div class="resultado" id="saida"></div>
  </div>
  <script src="script.js"></script>
</body>
